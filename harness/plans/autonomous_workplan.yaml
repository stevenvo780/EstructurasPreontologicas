# Plan operativo para modo continuo del harness
#
# Cada entrada es una tarea autónoma que la asistencia computacional puede
# ejecutar sin firma humana. NUNCA incluye:
#   - Edición de TesisFinal/Tesis.md (derivado, hook bloquea)
#   - Edición de outputs/metrics.json (fuente de verdad numérica, hook bloquea)
#   - Tareas H-J* (requieren firma de Jacob)
#   - Operaciones git destructivas
#
# Cada tarea declara:
#   id            - identificador estable
#   subject       - descripción corta
#   priority      - 1 (alta) ... 4 (baja)
#   est_minutes   - estimación honesta de duración
#   action        - kind: verifier | shell | engagement | audit
#   blocked_by    - dependencias (otras tareas o ID externo)
#   touches       - paths que modifica (auditar contra hooks)
#   acceptance    - métrica para considerar la tarea cerrada

